<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Dibla News Radar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2.48.0/dist/umd/supabase.js"></script>
</head>
<body>
  <div class="app-root">
    <aside class="sidebar">
      <div class="logo-row">
        <div class="logo-circle"></div>
        <div>
          <div class="logo-text-main">Dibla News Radar</div>
          <div class="logo-text-sub">IT • Cyber • Compliance</div>
        </div>
      </div>

      <div class="section-title">Timeframe</div>
      <label class="time-radio">
        <input type="radio" name="tf" value="3h" /> Realtime (3h)
      </label>
      <label class="time-radio">
        <input type="radio" name="tf" value="24h" checked /> Ultime 24h
      </label>
      <label class="time-radio">
        <input type="radio" name="tf" value="48h" /> 48h
      </label>
      <label class="time-radio">
        <input type="radio" name="tf" value="72h" /> 72h
      </label>
      <label class="time-radio">
        <input type="radio" name="tf" value="1week" /> 1 week
      </label>
      <label class="time-radio">
        <input type="radio" name="tf" value="all" /> Tutto
      </label>

      <button id="reset-filters" class="pill-btn" style="margin-top:10px;">
        <span>Reset timeframe</span>
        <span>↺</span>
      </button>

      <div class="sidebar-footer">
        Ultimo aggiornamento: <span id="last-update">–</span><br />
        <span style="text-decoration: underline; cursor: pointer;">Impostazioni feed</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="breadcrumb">Dashboard / Radar</div>
        <div class="search-wrap">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input id="search-input" placeholder="Cerca per parola chiave, vendor, CVE…" />
          </div>
        </div>
        <div>
          <div class="view-toggle">
            <button class="active">Radar</button>
            <button disabled>Timeline</button>
          </div>
        </div>
      </header>

      <section class="content">
        <div class="content-main">
          <div id="loading" style="font-size:12px; color:#9ca3af;">Caricamento storie…</div>

          <div id="hero-row" class="hero-row" style="display:none;"></div>

          <div id="story-grid" class="story-grid" style="margin-top:12px;"></div>
        </div>

        <aside class="content-detail" id="detail-panel">
          <p style="font-size: 12px; color: #9ca3af;">
            Seleziona una storia per vedere i dettagli e generare una bozza LinkedIn.
          </p>
          <div id="linkedin-box" class="detail-box" style="margin-top:12px; display:none;"></div>
          <div id="linkedin-summary-box" class="detail-box" style="margin-top:12px; display:none;"></div>
        </aside>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
